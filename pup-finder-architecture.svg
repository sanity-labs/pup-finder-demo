<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 920" width="860" height="920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap');
      text { font-family: 'DM Sans', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .title { font-size: 26px; font-weight: 700; fill: #1a1a1f; }
      .title-accent { fill: #7c5fc7; }
      .subtitle { font-size: 13px; fill: #6b6b76; }
      .box-title { font-size: 13px; font-weight: 600; fill: #1a1a1f; }
      .box-sub { font-size: 11px; fill: #8a8a96; }
      .arrow-label { font-size: 9.5px; fill: #8a8a96; }
      .pill-text { font-size: 10px; font-weight: 500; }
      .json-key { fill: #7c9bf6; }
      .json-str { fill: #6ccca0; }
      .json-plain { fill: #a0a0ae; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="920" fill="#ffffff"/>

  <!-- Header -->
  <text x="430" y="44" text-anchor="middle" class="title">🐕 Pup Finder <tspan class="title-accent">Architecture</tspan></text>
  <text x="430" y="66" text-anchor="middle" class="subtitle">Natural-language dog matching powered by Sanity Agent Context.</text>
  <text x="430" y="82" text-anchor="middle" class="subtitle">AI queries structured content, returns ranked results as JSON, and the UI does the rest.</text>

  <!-- ═══ Step 1: Search bar ═══ -->
  <rect x="190" y="108" width="480" height="68" rx="10" fill="#f7f7f9" stroke="#e4e4ea"/>
  <circle cx="210" cy="128" r="4" fill="#7c5fc7"/>
  <text x="222" y="132" class="box-title">Search bar</text>
  <text x="210" y="150" class="box-sub">User types a natural-language query like "chill dog that won't</text>
  <text x="210" y="164" class="box-sub">chase my cats." SearchInput.tsx sends it via useChat.</text>

  <!-- Arrow 1 -->
  <line x1="430" y1="176" x2="430" y2="204" stroke="#d0d0d8" stroke-width="1"/>
  <polygon points="426,202 434,202 430,208" fill="#d0d0d8"/>
  <rect x="340" y="185" width="120" height="16" rx="4" fill="#f2f2f5"/>
  <text x="400" y="196" text-anchor="middle" class="arrow-label mono">POST /api/chat</text>

  <!-- ═══ Step 2: API route + MCP (two boxes) ═══ -->
  <rect x="60" y="218" width="340" height="80" rx="10" fill="#f7f7f9" stroke="#e4e4ea"/>
  <circle cx="80" cy="238" r="4" fill="#111111"/>
  <text x="92" y="242" class="box-title">API route</text>
  <text x="80" y="260" class="box-sub">Connects to Agent Context MCP endpoint using a</text>
  <text x="80" y="274" class="box-sub">full URL from SANITY_CONTEXT_MCP_URL env var.</text>
  <text x="80" y="288" class="box-sub">System prompt is hardcoded in the route.</text>

  <rect x="420" y="218" width="380" height="80" rx="10" fill="#f7f7f9" stroke="#e4e4ea"/>
  <circle cx="440" cy="238" r="4" fill="#3b82f6"/>
  <text x="452" y="242" class="box-title">Agent Context (MCP)</text>
  <text x="440" y="260" class="box-sub">Scoped to the dog document type. Gives the agent</text>
  <text x="440" y="274" class="box-sub">schema-aware, read-only access to 30+ fields per dog.</text>

  <!-- Arrow 2 -->
  <line x1="430" y1="298" x2="430" y2="326" stroke="#d0d0d8" stroke-width="1"/>
  <polygon points="426,324 434,324 430,330" fill="#d0d0d8"/>
  <rect x="325" y="307" width="168" height="16" rx="4" fill="#f2f2f5"/>
  <text x="409" y="318" text-anchor="middle" class="arrow-label mono">MCP tools → streamText()</text>

  <!-- ═══ Step 3: Claude ═══ -->
  <rect x="150" y="340" width="560" height="100" rx="10" fill="#f7f7f9" stroke="#e4e4ea"/>
  <circle cx="170" cy="360" r="4" fill="#b07830"/>
  <text x="182" y="364" class="box-title">Claude (Haiku 4.5)</text>
  <text x="170" y="382" class="box-sub">Explores the schema, writes GROQ queries against real fields (hypoallergenic,</text>
  <text x="170" y="396" class="box-sub">goodWithCats, energyLevel), and returns a structured JSON response. MCP tools only.</text>

  <!-- Tool pills -->
  <rect x="237" y="410" width="88" height="20" rx="10" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.25)"/>
  <text x="281" y="424" text-anchor="middle" class="pill-text mono" fill="#3b82f6">groq_query</text>

  <rect x="335" y="410" width="120" height="20" rx="10" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.25)"/>
  <text x="395" y="424" text-anchor="middle" class="pill-text mono" fill="#3b82f6">schema_explorer</text>

  <rect x="465" y="410" width="108" height="20" rx="10" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.25)"/>
  <text x="519" y="424" text-anchor="middle" class="pill-text mono" fill="#3b82f6">initial_context</text>

  <!-- Arrow 3 -->
  <line x1="430" y1="440" x2="430" y2="468" stroke="#d0d0d8" stroke-width="1"/>
  <polygon points="426,466 434,466 430,472" fill="#d0d0d8"/>
  <rect x="310" y="449" width="198" height="16" rx="4" fill="#f2f2f5"/>
  <text x="409" y="460" text-anchor="middle" class="arrow-label mono">JSON response (not chat text)</text>

  <!-- ═══ Step 4: Structured output + JSON preview ═══ -->
  <rect x="150" y="480" width="560" height="148" rx="10" fill="#f7f7f9" stroke="#e4e4ea"/>
  <circle cx="170" cy="500" r="4" fill="#16a06a"/>
  <text x="182" y="504" class="box-title">Structured output</text>
  <text x="170" y="522" class="box-sub">Claude returns only JSON. The client parses it and renders custom UI — the raw LLM</text>
  <text x="170" y="536" class="box-sub">response is never shown to the user.</text>

  <!-- JSON preview block -->
  <rect x="170" y="548" width="520" height="68" rx="6" fill="#1a1a1f"/>
  <text x="184" y="566" class="mono" font-size="10">
    <tspan class="json-plain">{ </tspan><tspan class="json-key">"message"</tspan><tspan class="json-plain">: </tspan><tspan class="json-str">"Found 4 chill pups..."</tspan><tspan class="json-plain">,</tspan>
  </text>
  <text x="194" y="582" class="mono" font-size="10">
    <tspan class="json-key">"matchedDogIds"</tspan><tspan class="json-plain">: [</tspan><tspan class="json-str">"dog-a1"</tspan><tspan class="json-plain">, </tspan><tspan class="json-str">"dog-b2"</tspan><tspan class="json-plain">, ...],</tspan>
  </text>
  <text x="194" y="598" class="mono" font-size="10">
    <tspan class="json-key">"followUps"</tspan><tspan class="json-plain">: [{ </tspan><tspan class="json-key">"field"</tspan><tspan class="json-plain">: </tspan><tspan class="json-str">"size"</tspan><tspan class="json-plain">, </tspan><tspan class="json-key">"options"</tspan><tspan class="json-plain">: [...] }] }</tspan>
  </text>

  <!-- Arrow 4 -->
  <line x1="430" y1="628" x2="430" y2="656" stroke="#d0d0d8" stroke-width="1"/>
  <polygon points="426,654 434,654 430,660" fill="#d0d0d8"/>
  <rect x="290" y="637" width="236" height="16" rx="4" fill="#f2f2f5"/>
  <text x="408" y="648" text-anchor="middle" class="arrow-label mono">ChatInterface.tsx parses + renders</text>

  <!-- ═══ Step 5: Two outcome boxes ═══ -->
  <rect x="150" y="670" width="265" height="80" rx="10" fill="#f7f7f9" stroke="#e4e4ea"/>
  <circle cx="170" cy="690" r="4" fill="#7c5fc7"/>
  <text x="182" y="694" class="box-title">Dog cards</text>
  <text x="170" y="712" class="box-sub">matchedDogIds looked up from pre-fetched</text>
  <text x="170" y="726" class="box-sub">dogs, rendered as DogProfileCard</text>
  <text x="170" y="740" class="box-sub">components sorted by best match.</text>

  <rect x="435" y="670" width="275" height="80" rx="10" fill="#f7f7f9" stroke="#e4e4ea"/>
  <circle cx="455" cy="690" r="4" fill="#ca8a04"/>
  <text x="467" y="694" class="box-title">Follow-up pills</text>
  <text x="455" y="712" class="box-sub">If 4+ dogs match, followUps render as</text>
  <text x="455" y="726" class="box-sub">clickable pills. Answering filters client-side</text>
  <text x="455" y="740" class="box-sub">via filterDogs() — no second AI call.</text>
</svg>
